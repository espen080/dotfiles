# general.import = [ "~/.config/omarchy/current/theme/alacritty.toml" ]
general.import = [ "rose-pine.toml" ]

[env]
TERM = "xterm-256color"

[terminal]
osc52 = "CopyPaste"

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
size = 12

[window]
padding.x = 14
padding.y = 14
decorations = "None"
opacity = 0.9

[keyboard]
bindings = [
  # Shift
  { key = "/", mods = "Shift", mode = "Vi|~Search", action = "SearchForward" },
  { key = "_", mods = "Shift", mode = "Vi|~Search", action = "First" },
  { key = "%", mods = "Shift", mode = "Vi|~Search", action = "Bracket" },
  # AltGr
  { key = "$", mode = "Vi|~Search", action = "Last" },
  { key = "{", mode = "Vi|~Search", action = "ParagraphUp" },
  { key = "}", mode = "Vi|~Search", action = "ParagraphDown" },
]
